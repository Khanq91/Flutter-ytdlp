name: ytdl_module
description: Video downloader module sử dụng libytdlp.so, tích hợp dark theme.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Network ───────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Storage & Permissions ─────────────────────────────
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  file_picker: ^8.1.2

  # ── UI ────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # ── Utils ─────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/bin/
    - assets/images/
