name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: flutter-ytdlp-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          cache: true

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Get app version
        id: version
        shell: bash
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]' | cut -d'+' -f1)"
          BUILD_TIME="$(date +'%Y%m%d_%H%M')"
          echo "name=flutter_ytdlp_v${VERSION}_${BUILD_TIME}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      - name: Build APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.version.outputs.name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.name }}.apk
          make_latest: true
          prerelease: false
          fail_on_unmatched_files: true
